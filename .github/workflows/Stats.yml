name: GitHub Stats

on:
  schedule:
    - cron: "0 */8 * * *"   # cada 8 horas
  workflow_dispatch:          # ejecución manual desde Actions

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: jstrieb/github-stats@master
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXCLUDED: ""                  # repos a excluir, separados por coma
          EXCLUDE_FORKED_REPOS: true

      - name: Move generated files
        run: |
          mkdir -p generated
          mv generated/overview.svg generated/overview.svg 2>/dev/null || true
          mv generated/languages.svg generated/languages.svg 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: stats
          path: generated/
